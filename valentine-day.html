<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>情人节快乐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #ff6b9d, #c44569, #f8b500);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            height: 600px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            display: flex;
            position: relative;
            overflow: hidden;
        }

        /* 左边文字区域 */
        .left-section {
            width: 50%;
            height: 100%;
            background: linear-gradient(180deg, #ff6b9d, #c44569);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .text-content {
            text-align: center;
            color: white;
            opacity: 0;
            transform: translateX(-50px);
            animation: fadeInLeft 2s ease-out forwards;
            animation-delay: 0.5s;
        }

        @keyframes fadeInLeft {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .main-text {
            font-size: 3.5rem;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            line-height: 1.2;
        }

        .sub-text {
            font-size: 1.5rem;
            opacity: 0.9;
            font-style: italic;
        }

        /* 右边装饰区域 */
        .right-section {
            width: 50%;
            height: 100%;
            background: linear-gradient(180deg, #f8b500, #ffd700);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* 爱心装饰 */
        .hearts-container {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .heart {
            position: absolute;
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.6);
            transform: rotate(-45deg);
            animation: floatHeart 6s ease-in-out infinite;
        }

        .heart::before,
        .heart::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
        }

        .heart::before {
            top: -10px;
            left: 0;
        }

        .heart::after {
            left: 10px;
            top: 0;
        }

        @keyframes floatHeart {
            0%, 100% {
                transform: translateY(100vh) rotate(-45deg);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-100px) rotate(-45deg);
                opacity: 0;
            }
        }

        /* 中心装饰 */
        .center-decoration {
            position: relative;
            z-index: 1;
        }

        .big-heart {
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.8);
            transform: rotate(-45deg);
            animation: heartbeat 1.5s ease-in-out infinite;
            position: relative;
        }

        .big-heart::before,
        .big-heart::after {
            content: '';
            position: absolute;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
        }

        .big-heart::before {
            top: -100px;
            left: 0;
        }

        .big-heart::after {
            left: 100px;
            top: 0;
        }

        @keyframes heartbeat {
            0%, 100% {
                transform: rotate(-45deg) scale(1);
            }
            14% {
                transform: rotate(-45deg) scale(1.1);
            }
            28% {
                transform: rotate(-45deg) scale(1);
            }
            42% {
                transform: rotate(-45deg) scale(1.1);
            }
            70% {
                transform: rotate(-45deg) scale(1);
            }
        }

        /* 按钮 */
        .btn {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 40px;
            background: linear-gradient(135deg, #ff6b9d, #c44569);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            z-index: 10;
        }

        .btn:hover {
            transform: translateX(-50%) translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .btn:active {
            transform: translateX(-50%) translateY(0);
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                height: auto;
                min-height: 100vh;
                border-radius: 0;
            }

            .left-section,
            .right-section {
                width: 100%;
                height: 50vh;
            }

            .main-text {
                font-size: 2.5rem;
            }

            .sub-text {
                font-size: 1.2rem;
            }

            .big-heart {
                width: 150px;
                height: 150px;
            }

            .big-heart::before,
            .big-heart::after {
                width: 150px;
                height: 150px;
            }

            .big-heart::before {
                top: -75px;
            }

            .big-heart::after {
                left: 75px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 左边文字区域 -->
        <div class="left-section">
            <div class="text-content">
                <div class="main-text">情人节快乐</div>
                <div class="sub-text">愿我们的爱永恒</div>
            </div>
        </div>

        <!-- 右边装饰区域 -->
        <div class="right-section">
            <div class="hearts-container" id="heartsContainer"></div>
            <div class="center-decoration">
                <div class="big-heart"></div>
            </div>
        </div>

        <!-- 按钮 -->
        <button class="btn" onclick="playMusic()">播放音乐</button>
    </div>

    <script>
        // 创建漂浮爱心
        function createHearts() {
            const container = document.getElementById('heartsContainer');
            const colors = ['rgba(255, 255, 255, 0.6)', 'rgba(255, 182, 193, 0.6)', 'rgba(255, 218, 185, 0.6)'];
            
            for (let i = 0; i < 20; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart';
                
                // 随机位置和颜色
                heart.style.left = Math.random() * 100 + '%';
                heart.style.animationDelay = Math.random() * 6 + 's';
                heart.style.animationDuration = (Math.random() * 3 + 4) + 's';
                heart.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                heart.style.width = (Math.random() * 15 + 10) + 'px';
                heart.style.height = heart.style.width;
                
                container.appendChild(heart);
            }
        }

        // 播放音乐（这里是模拟）
        function playMusic() {
            alert('音乐播放功能需要实际的音频文件支持');
        }

        // 页面加载完成后创建爱心
        document.addEventListener('DOMContentLoaded', function() {
            createHearts();
        });
    </script>
</body>
</html>
